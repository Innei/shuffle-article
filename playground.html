<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playground - Shuffle Article</title>
    <style>
      html {
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      body {
        margin: 0;
        padding: 1em;
      }

      .g {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-gap: 1em;
      }

      @media (max-width: 1200px) {
        .g {
          grid-template-columns: auto;
          grid-template-rows: auto auto;
        }
      }

      #editor {
        min-height: 200px;
        width: 100%;
        position: relative;
        word-break: break-all;
        overflow: auto;
        outline: none;
        border: 1px solid #ddd;
        border-radius: 4px;
        padding: 1em;
        box-sizing: border-box;
        line-height: 1.8;
        font-size: 16px;
        transition: border-color 0.2s, box-shadow 0.2s;
      }

      #editor:focus {
        border-color: #1c6bff;
        box-shadow: 0 0 0 2px rgba(28, 107, 255, 0.2);
      }

      .label {
        font-weight: bold;
        color: #666;
        border-bottom: 1px solid #eee;
        padding-bottom: 0.3em;
        margin-bottom: 0.5em;
      }

      .raw-view span {
        position: static !important;
      }

      .visual-view {
        line-height: 1.8;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./demo/playground-main.tsx"></script>
  </body>
</html>
