<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shuffle Article Demo</title>
    <style>
      :root {
        --bg-color: #ffffff;
        --text-color: #333333;
      }

      html {
        font-size: 18px;
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      body {
        margin: 0;
        padding: 0;
      }

      .header {
        text-align: center;
        padding-top: 20px;
      }

      .controls {
        text-align: center;
        margin: 1em 0;
      }

      .controls button {
        padding: 0.4em 1.2em;
        font-size: 1rem;
        cursor: pointer;
        border: 1px solid #ccc;
        border-radius: 4px;
        background: #fafafa;
        transition: background 0.2s;
      }

      .controls button:hover {
        background: #eee;
      }

      .g {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-gap: 1em;
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 1em;
      }

      @media (max-width: 800px) {
        .g {
          grid-template-columns: auto;
          grid-template-rows: 1fr 1fr;
        }
      }

      .write {
        font-weight: 300;
        max-width: 600px;
        line-height: 1.8;
      }

      .write p {
        text-indent: 2em;
      }

      .raw span {
        position: static !important;
      }

      .label {
        font-weight: bold;
        color: #666;
        border-bottom: 1px solid #eee;
        padding-bottom: 0.3em;
        margin-bottom: 0.5em;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./demo/main.tsx"></script>
  </body>
</html>
