<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shuffle Article</title>
    <style>
      :root {
        --bg: #000;
        --bg-secondary: #0a0a0a;
        --border: #222;
        --text: #ededed;
        --text-secondary: #888;
        --text-tertiary: #555;
        --accent: #fff;
        --radius: 6px;
        --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          'Helvetica Neue', Arial, 'Noto Sans SC', 'PingFang SC', sans-serif;
        --font-mono: 'SF Mono', SFMono-Regular, ui-monospace, Menlo, monospace;
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg: #fff;
          --bg-secondary: #fafafa;
          --border: #eaeaea;
          --text: #171717;
          --text-secondary: #666;
          --text-tertiary: #999;
          --accent: #000;
        }
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      html {
        font-size: 16px;
        color: var(--text);
        font-family: var(--font);
        -webkit-font-smoothing: antialiased;
      }

      body {
        background: var(--bg);
        min-height: 100vh;
      }

      #root {
        max-width: 1000px;
        margin: 0 auto;
        padding: 0 24px 64px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
